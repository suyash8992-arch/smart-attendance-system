<!DOCTYPE html>
<html>
<head>
    <title>Attendance Dashboard</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .card {
            margin-top: 100px;
            background: #1f1f2e;
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }

        #count {
            font-size: 3em;
            color: #00ffcc;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Live Attendance</h1>
    <div id="count">0</div>
    <ul id="names"></ul>
    <p id="status">Waiting...</p>
</div>

<script>
async function load() {
    try {
        const res = await fetch("http://10.117.76.158:8000/attendance-today");
        const data = await res.json();

        console.log("DATA:", data);

        document.getElementById("count").innerText = data.count;

        const list = document.getElementById("names");
        list.innerHTML = "";

        if (data.names.length === 0) {
            list.innerHTML = "<li>No one present</li>";
        } else {
            data.names.forEach(name => {
                const li = document.createElement("li");
                li.innerText = name;
                list.appendChild(li);
            });
        }

        document.getElementById("status").innerText = "Updated";

    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Error fetching data";
    }
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
